<!DOCTYPE html>
<html>
<head>
  <title>Video Optimizer</title>
</head>
<body style="text-align:center;font-family:Arial;background:#111;color:white;padding:20px;">

<h2>Video Optimizer</h2>

<input type="file" id="video" />
<br><br>
<button onclick="upload()">Optimize</button>

<p id="status"></p>
<div id="result"></div>

<script>
async function upload() {
  const file = document.getElementById("video").files[0];
  if (!file) return alert("Select video");

  document.getElementById("status").innerText = "Processing...";

  const formData = new FormData();
  formData.append("video", file);

  const res = await fetch("/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  document.getElementById("status").innerText = "Done!";

  const link = document.createElement("a");
  link.href = "/outputs/" + data.file;
  link.innerText = "Download Video";
  link.style.display = "block";

  document.getElementById("result").appendChild(link);
}
</script>

</body>
</html>
